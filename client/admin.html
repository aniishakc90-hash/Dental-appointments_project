<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="admin">
  <header class="topbar">
    <div class="brand">Dental Care</div>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="appointments.html">Appointments</a>
      <a href="admin.html" class="active">Admin</a>
    </nav>
  </header>

  <main class="page admin-page">
    <section class="section-head">
      <h1>Admin Dashboard</h1>
      <p>Overview of appointments and treatments</p>
    </section>

    <section class="stats-grid">
      <div class="stat-card">
        <h3>Total Appointments</h3>
        <p id="totalAppointments">0</p>
      </div>
      <div class="stat-card">
        <h3>Today's Appointments</h3>
        <p id="todayAppointments">0</p>
      </div>
      <div class="stat-card">
        <h3>Total Treatments</h3>
        <p id="totalTreatments">0</p>
      </div>
    </section>

    <section class="card table-card">
      <div class="admin-table-head">
        <h2>Recent Appointments</h2>
      </div>
      <div class="table-wrap">
        <table class="appointments-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Date</th>
              <th>Time</th>
              <th>Treatment</th>
            </tr>
          </thead>
          <tbody id="recentAppointmentsBody">
            <tr>
              <td colspan="4" class="empty-cell">Loading data...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
