<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Appointment</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="edit">
  <header class="topbar">
    <div class="brand">Dental Care</div>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="appointments.html">Appointments</a>
      <a href="admin.html">Admin</a>
    </nav>
  </header>

  <main class="page centered-page">
    <section class="form-card">
      <div class="form-header">Edit Appointment</div>

      <form id="editAppointmentForm" class="form-body">
        <div class="field">
          <label for="editFirstName">First Name</label>
          <input type="text" id="editFirstName" placeholder="Enter first name" required />
        </div>

        <div class="field">
          <label for="editLastName">Last Name</label>
          <input type="text" id="editLastName" placeholder="Enter last name" required />
        </div>

        <div class="row two-col">
          <div class="field">
            <label for="editDate">Date</label>
            <input type="date" id="editDate" required />
          </div>

          <div class="field">
            <label for="editTime">Time</label>
            <input type="text" id="editTime" placeholder="Enter time e.g. 10:00 AM" required />
          </div>
        </div>

        <div class="field">
          <label for="editTreatment">Treatment</label>
          <input type="text" id="editTreatment" placeholder="Enter treatment" required />
        </div>

        <div class="actions-row">
          <button type="submit" class="btn btn-secondary">Update Appointment</button>
          <a href="appointments.html" class="btn btn-light">Cancel</a>
        </div>
      </form>
    </section>
  </main>

  <div class="toast hidden" id="toastMessage"></div>

  <script src="app.js"></script>
</body>
</html>
